<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burger Queen AI Console</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="atmosphere atmosphere-orange" aria-hidden="true"></div>
    <div class="atmosphere atmosphere-purple" aria-hidden="true"></div>

    <header class="app-header">
      <div class="brand">
        <img
          class="brand-logo"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIJoIg1Dcbu0tBXOZSvr4ObHQ1PUG1KH6MKPKLUP5e_MQncDr_0d3DkHLe2x2RYxThkre24gKk6ykqtAGcSJoLRnl0jaYrdSnQrI9BDfoavFcJdfd-a3sVKMpmChuaya5gK0sB1H8DX6t6lCzLXxW2uECP9xfcqwQ6HQKwDSz-mDIqtmYlgsOkxzljVYq-DkvQJcvdec0ZfF_5B300U0IclDgZIh00NXpq-EatZ2S5I7gSa8HfXquBlsufSoVLvRCfgo-ZyGl1x8w"
          alt="Burger Queen"
        />
        <div class="brand-text">
          <h1>Burger Queen</h1>
          <p>Assistente com memória e RAG</p>
        </div>
      </div>

      <div class="header-actions">
        <div id="login-bar" class="login-bar">
          <input
            id="login-input"
            type="text"
            placeholder="ana, bruno, carla…"
            autocomplete="username"
            aria-label="Login"
          />
          <button id="login-btn" type="button" class="btn btn-primary">
            Entrar
          </button>
        </div>

        <div id="user-menu" class="user-menu is-hidden">
          <button
            id="user-menu-btn"
            type="button"
            class="user-pill"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span class="user-pill-label">Usuário:</span>
            <span id="session-display-name" class="user-pill-name">—</span>
            <span class="material-symbols-outlined user-pill-chevron"
              >expand_more</span
            >
          </button>
          <div id="user-menu-dropdown" class="user-dropdown is-hidden" role="menu">
            <button id="switch-user-btn" type="button" role="menuitem">
              Trocar usuário
            </button>
          </div>
        </div>

        <button id="logout-btn" type="button" class="btn btn-primary is-hidden">
          Sair
        </button>

        <label class="debug-switch">
          <input id="debug-toggle" type="checkbox" />
          <span class="debug-switch-track" aria-hidden="true"></span>
          <span class="debug-switch-label">Debug</span>
        </label>
      </div>
    </header>

    <div id="app-shell" class="app-shell">
      <aside class="facts-panel" aria-label="Fatos ativos">
        <div class="panel-head">
          <h2>Fatos Ativos</h2>
          <span class="material-symbols-outlined icon-accent">database</span>
        </div>
        <ul id="facts-list" class="facts-list"></ul>
      </aside>

      <section class="chat-panel" aria-label="Conversa">
        <div class="chat-head">
          <div class="chat-head-left">
            <div class="chat-avatar-wrap">
              <div class="chat-avatar">
                <img
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIJoIg1Dcbu0tBXOZSvr4ObHQ1PUG1KH6MKPKLUP5e_MQncDr_0d3DkHLe2x2RYxThkre24gKk6ykqtAGcSJoLRnl0jaYrdSnQrI9BDfoavFcJdfd-a3sVKMpmChuaya5gK0sB1H8DX6t6lCzLXxW2uECP9xfcqwQ6HQKwDSz-mDIqtmYlgsOkxzljVYq-DkvQJcvdec0ZfF_5B300U0IclDgZIh00NXpq-EatZ2S5I7gSa8HfXquBlsufSoVLvRCfgo-ZyGl1x8w"
                  alt=""
                />
              </div>
              <span id="session-dot" class="session-dot"></span>
            </div>
            <div class="chat-head-text">
              <h3 id="chat-session-title">Sessão</h3>
              <p id="chat-session-subtitle">Faça login para iniciar</p>
            </div>
          </div>
          <span id="status-line" class="status-line">Pronto</span>
        </div>

        <div id="chat-thread" class="chat-thread">
          <p class="chat-placeholder">
            Faça login e envie uma mensagem. Experimente
            <em>“O que você me recomenda hoje?”</em> com Ana e Bruno.
          </p>
        </div>

        <div id="typing-indicator" class="typing-indicator is-hidden" aria-live="polite">
          <span class="typing-dot"></span>
          <span class="typing-dot typing-dot-delay-1"></span>
          <span class="typing-dot typing-dot-delay-2"></span>
          <span class="typing-hint">Aguardando resposta…</span>
        </div>

        <form id="chat-form" class="chat-form">
          <div class="composer">
            <input
              id="message-input"
              type="text"
              placeholder="Digite sua mensagem..."
              disabled
              autocomplete="off"
            />
            <button
              id="send-btn"
              type="submit"
              class="btn btn-primary btn-send"
              disabled
            >
              Enviar
              <span class="material-symbols-outlined">send</span>
            </button>
          </div>
        </form>
      </section>

      <div class="logs-slot" aria-hidden="true">
        <aside id="debug-panel" class="logs-panel" aria-label="System Logs" hidden>
          <div class="logs-head">
            <div class="logs-title">
              <span class="material-symbols-outlined icon-secondary">terminal</span>
              <h2>System Logs</h2>
            </div>
            <span class="logs-badge">Live</span>
          </div>
          <div id="debug-content" class="logs-body"></div>
        </aside>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
