<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burger Queen — Assistente</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-brand">
          <h1>Burger Queen</h1>
          <span class="subtitle">Assistente com memória e RAG</span>
        </div>
        <div class="session-bar">
          <input
            id="login-input"
            type="text"
            class="login-input"
            placeholder="Login: ana, bruno, carla…"
            autocomplete="username"
            aria-label="Login"
          />
          <button id="login-btn" type="button">Entrar</button>
          <button
            id="logout-btn"
            type="button"
            class="btn-secondary"
            hidden
          >
            Sair
          </button>
          <label class="debug-toggle">
            <input id="debug-toggle" type="checkbox" />
            Debug
          </label>
          <span id="session-info" class="session-info">Não conectado</span>
        </div>
      </header>

      <main id="main" class="main">
        <section class="chat-panel" aria-label="Conversa">
          <div class="chat-header">
            <span class="chat-header-title">Conversa</span>
            <span id="status-line" class="status-line">Pronto</span>
          </div>
          <div id="chat-thread" class="chat-thread">
            <p class="chat-placeholder">
              Faça login e envie uma mensagem. Experimente
              <em>“O que você me recomenda hoje?”</em> com Ana e Bruno.
            </p>
          </div>
          <form id="chat-form" class="chat-form">
            <input
              id="message-input"
              type="text"
              placeholder="Digite sua mensagem…"
              disabled
              autocomplete="off"
            />
            <button id="send-btn" type="submit" disabled>Enviar</button>
          </form>
        </section>

        <aside class="sidebar" aria-label="Painel lateral">
          <section class="facts-panel" aria-label="Fatos do usuário">
            <h2>Fatos ativos</h2>
            <ul id="facts-list" class="facts-list">
              <li class="facts-empty">Entre com um usuário para ver fatos.</li>
            </ul>
          </section>

          <section
            id="debug-panel"
            class="debug-panel hidden"
            aria-label="Debug da orquestração"
          >
            <h2>Debug</h2>
            <pre id="debug-content" class="debug-content">—</pre>
          </section>
        </aside>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
